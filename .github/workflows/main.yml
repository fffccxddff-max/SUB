name: Windows 10 Keep Alive RDP

# اجرای دستی یا دریافت ریکوئست از API (توسط کد C++)
on:
  workflow_dispatch:

jobs:
  build_and_run:
    runs-on: windows-latest
    timeout-minutes: 360 # حداکثر زمان مجاز گیت‌هاب اکشن (۶ ساعت)

    steps:
    - name: دریافت کدهای مخزن
      uses: actions/checkout@v4

    - name: تنظیم ابزارهای C++ (MSVC)
      uses: ilammy/msvc-dev-cmd@v1

    - name: فعال‌سازی و تنظیم ریموت دسکتاپ (RDP) در ویندوز
      run: |
        # فعال‌سازی ریموت دسکتاپ در رجیستری ویندوز رانر
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -name "UserAuthentication" -Value 1
        
        # تعریف نام کاربری جدید برای جلوگیری از تداخل با کاربران سیستم
        $Username = "RdpRunnerAdmin"
        $Password = ConvertTo-SecureString "GitHubWin10SecureP@ss!" -AsPlainText -Force
        
        # بررسی وجود کاربر و ساخت یا آپدیت آن
        if (Get-LocalUser -Name $Username -ErrorAction SilentlyContinue) {
            Write-Host "User $Username already exists. Updating password..."
            Set-LocalUser -Name $Username -Password $Password
        } else {
            Write-Host "Creating new user $Username..."
            New-LocalUser $Username -Password $Password -Description "RDP Admin User"
        }
        
        # اضافه کردن کاربر به گروه‌های دسترسی ادمین و ریموت دسکتاپ
        Add-LocalGroupMember -Group "Administrators" -Member $Username -ErrorAction SilentlyContinue
        Add-LocalGroupMember -Group "Remote Desktop Users" -Member $Username -ErrorAction SilentlyContinue

    - name: راه‌اندازی تونل ارتباطی فوق‌پایدار بدون نیاز به ثبت‌نام (SSH Tunneling)
      shell: powershell
      run: |
        Write-Host "Starting SSH Tunnel using Pinggy (No Auth Token Required!)..."
        
        # ایجاد فایل متنی برای ذخیره آدرس اتصال
        New-Item -Path ".\tunnel_info.txt" -ItemType File -Force | Out-Null
        
        # اجرای اتصال SSH به سرورهای تونلینگ رایگان پینگی در پس‌زمینه
        # این سرویس پورت ۳۳۸۹ رانر را به یک آدرس عمومی متصل می‌کند
        $process = Start-Process ssh -ArgumentList "-o StrictHostKeyChecking=no -R 0:127.0.0.1:3389 tcp@ap.pinggy.io" -RedirectStandardOutput ".\tunnel_info.txt" -PassThru
        
        # ۵ ثانیه صبر برای دریافت مشخصات پورت عمومی
        Start-Sleep -Seconds 5
        
        # تلاش برای خواندن اطلاعات و چاپ آدرس عمومی
        $attempts = 0
        $address_found = $false
        
        while ($attempts -lt 10 -and -not $address_found) {
            $attempts++
            if (Test-Path ".\tunnel_info.txt") {
                $content = Get-Content ".\tunnel_info.txt" -Raw
                if ($content -match "tcp:\/\/ap\.pinggy\.io:\d+") {
                    $address = $matches[0]
                    Write-Host "==========================================================" -ForegroundColor Green
                    Write-Host "RDP Connect Link: $address" -ForegroundColor Green
                    Write-Host "Username: RdpRunnerAdmin" -ForegroundColor Green
                    Write-Host "Password: GitHubWin10SecureP@ss!" -ForegroundColor Green
                    Write-Host "==========================================================" -ForegroundColor Green
                    $address_found = $true
                }
            }
            if (-not $address_found) {
                Start-Sleep -Seconds 3
            }
        }
        
        if (-not $address_found) {
            Write-Host "Pinggy limit reached or slow response. Trying alternative tunnel (localhost.run)..."
            Start-Process ssh -ArgumentList "-o StrictHostKeyChecking=no -R 80:127.0.0.1:3389 nokey@localhost.run" -RedirectStandardOutput ".\tunnel_info2.txt"
            Start-Sleep -Seconds 5
            if (Test-Path ".\tunnel_info2.txt") {
                Get-Content ".\tunnel_info2.txt" -Tail 10
            }
        }

    - name: کامپایل کردن برنامه C++
      run: |
        # کامپایل سورس کد C++ با استفاده از کامپایلر مایکروسافت (cl.exe)
        cl.exe /EHsc main.cpp

    - name: اجرای برنامه C++ جهت مدیریت زمان ۵.۵ ساعت و تریگر مجدد
      env:
        GH_PAT: ${{ secrets.GH_PAT }}
      run: |
        # اجرای برنامه برای زنده نگه داشتن سرور و راه‌اندازی مجدد خودکار
        .\main.exe
