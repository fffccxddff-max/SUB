name: Windows 10 Keep Alive RDP

# اجرای دستی یا دریافت ریکوئست از API (توسط کد C++)
on:
  workflow_dispatch:

jobs:
  build_and_run:
    runs-on: windows-latest
    timeout-minutes: 360 # حداکثر زمان مجاز گیت‌هاب اکشن (۶ ساعت)

    steps:
    - name: دریافت کدهای مخزن
      uses: actions/checkout@v4

    - name: تنظیم ابزارهای C++ (MSVC)
      uses: ilammy/msvc-dev-cmd@v1

    - name: فعال‌سازی و تنظیم ریموت دسکتاپ (RDP) در ویندوز
      run: |
        # فعال‌سازی ریموت دسکتاپ در رجیستری ویندوز رانر
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -name "UserAuthentication" -Value 1
        
        # تعریف نام کاربری جدید برای جلوگیری از تداخل با کاربران سیستم
        $Username = "RdpRunnerAdmin"
        $Password = ConvertTo-SecureString "GitHubWin10SecureP@ss!" -AsPlainText -Force
        
        # بررسی وجود کاربر و ساخت یا آپدیت آن
        if (Get-LocalUser -Name $Username -ErrorAction SilentlyContinue) {
            Write-Host "User $Username already exists. Updating password..."
            Set-LocalUser -Name $Username -Password $Password
        } else {
            Write-Host "Creating new user $Username..."
            New-LocalUser $Username -Password $Password -Description "RDP Admin User"
        }
        
        # اضافه کردن کاربر به گروه‌های دسترسی ادمین و ریموت دسکتاپ
        Add-LocalGroupMember -Group "Administrators" -Member $Username -ErrorAction SilentlyContinue
        Add-LocalGroupMember -Group "Remote Desktop Users" -Member $Username -ErrorAction SilentlyContinue

    - name: نصب و راه‌اندازی تونل Ngrok برای دسترسی به محیط گرافیکی
      run: |
        # دانلود آخرین نسخه پایدار ابزار نگراک برای ویندوز
        Invoke-WebRequest -Uri "https://bin.equinox.io/c/bTsD89q6id5/ngrok-v3-stable-windows-amd64.zip" -OutFile "ngrok.zip" -ErrorAction SilentlyContinue
        
        # در صورتی که لینک اول با خطا مواجه شد، از لینک مستقیم و پایدار دوم استفاده می‌کند
        if (!(Test-Path "ngrok.zip") -or (Get-Item "ngrok.zip").Length -lt 1000) {
            Write-Host "Using fallback download URL for Ngrok..."
            Invoke-WebRequest -Uri "https://bin.equinox.io/c/4VmDzA7iaHb/ngrok-stable-windows-amd64.zip" -OutFile "ngrok.zip"
        }
        
        # خارج کردن فایل از حالت فشرده
        Expand-Archive ngrok.zip -DestinationPath .\ngrok -Force
        
        # تنظیم توکن نگراک
        .\ngrok\ngrok.exe config add-authtoken "${{ secrets.NGROK_AUTH_TOKEN }}"
        
        # اجرای تونل RDP در پس‌زمینه روی پورت ۳۳۸۹ ریموت دسکتاپ
        Start-Process .\ngrok\ngrok.exe -ArgumentList "tcp 3389"
        
        # نمایش آدرس اتصال به ریموت دسکتاپ
        Start-Sleep -Seconds 10
        $output = Invoke-RestMethod -Uri http://127.0.0.1:4040/api/tunnels
        $public_url = $output.tunnels[0].public_url
        Write-Host "==========================================================" -ForegroundColor Green
        Write-Host "RDP Address: $public_url" -ForegroundColor Green
        Write-Host "Username: RdpRunnerAdmin" -ForegroundColor Green
        Write-Host "Password: GitHubWin10SecureP@ss!" -ForegroundColor Green
        Write-Host "==========================================================" -ForegroundColor Green

    - name: کامپایل کردن برنامه C++
      run: |
        # کامپایل سورس کد C++ با استفاده از کامپایلر مایکروسافت (cl.exe)
        cl.exe /EHsc main.cpp

    - name: اجرای برنامه C++ جهت مدیریت زمان ۵.۵ ساعت و تریگر مجدد
      env:
        GH_PAT: ${{ secrets.GH_PAT }}
      run: |
        # اجرای برنامه برای زنده نگه داشتن سرور و راه‌اندازی مجدد خودکار
        .\main.exe
