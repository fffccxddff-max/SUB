name: Windows 10 Keep Alive RDP

# اجرای دستی یا دریافت ریکوئست از API (توسط پایتون)
on:
  workflow_dispatch:

jobs:
  build_and_run:
    runs-on: windows-latest
    timeout-minutes: 360 # حداکثر زمان مجاز گیت‌هاب اکشن (۶ ساعت)

    steps:
    - name: دریافت کدهای مخزن
      uses: actions/checkout@v4

    - name: فعال‌سازی، راه‌اندازی سرویس RDP و تنظیم فایروال ویندوز
      shell: powershell
      run: |
        Write-Host "Configuring Remote Desktop Services..."
        
        # ۱. فعال‌سازی ریموت دسکتاپ در رجیستری
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        
        # ۲. غیرفعال کردن NLA برای سازگاری کامل با کلاینت‌های موبایل
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0
        
        # ۳. تنظیم و استارت سرویس ریموت دسکتاپ ویندوز (بدون پارامتر اشتباه -Force)
        Set-Service -Name "TermService" -StartupType Automatic
        Start-Service -Name "TermService"
        
        # ۴. باز کردن کامل فایروال ویندوز برای پورت RDP (3389)
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        
        # ۵. ساخت کاربر ادمین برای اتصال شما
        $Username = "RdpRunnerAdmin"
        $Password = ConvertTo-SecureString "GitHubWin10SecureP@ss!" -AsPlainText -Force
        
        if (Get-LocalUser -Name $Username -ErrorAction SilentlyContinue) {
            Write-Host "User $Username already exists. Updating password..."
            Set-LocalUser -Name $Username -Password $Password
        } else {
            Write-Host "Creating new user $Username..."
            New-LocalUser $Username -Password $Password -Description "RDP Admin User"
        }
        
        # اضافه کردن کاربر به گروه‌های ادمین و ریموت دسکتاپ
        Add-LocalGroupMember -Group "Administrators" -Member $Username -ErrorAction SilentlyContinue
        Add-LocalGroupMember -Group "Remote Desktop Users" -Member $Username -ErrorAction SilentlyContinue
        
        Write-Host "RDP and User Configuration completed successfully!"

    - name: دانلود و راه‌اندازی تونل مستقیم Bore (مناسب برای گوشی)
      shell: powershell
      run: |
        Write-Host "Downloading Bore Tunnel..."
        # دانلود ابزار Bore برای ویندوز
        Invoke-WebRequest -Uri "https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-pc-windows-msvc.zip" -OutFile "bore.zip"
        Expand-Archive bore.zip -DestinationPath .\bore -Force
        
        Write-Host "Starting Bore Tunnel..."
        # فوروارد پورت RDP روی سرور عمومی
        Start-Process .\bore\bore.exe -ArgumentList "local 3389 --to bore.pub" -RedirectStandardOutput ".\bore.log" -RedirectStandardError ".\bore_err.log"
        
        # ۱۰ ثانیه انتظار برای تخصیص پورت
        Start-Sleep -Seconds 10
        
        $attempts = 0
        $direct_address = $null
        
        while ($attempts -lt 12 -and $null -eq $direct_address) {
            $attempts++
            if (Test-Path ".\bore.log") {
                $log_content = Get-Content ".\bore.log" -Raw
                if ($log_content -match "bore\.pub:\d+") {
                    $direct_address = $matches[0]
                }
            }
            if ($null -eq $direct_address) {
                Start-Sleep -Seconds 3
            }
        }
        
        if ($null -ne $direct_address) {
            Write-Host "==========================================================" -ForegroundColor Green
            Write-Host "BORE DIRECT TUNNEL IS ONLINE!" -ForegroundColor Green
            Write-Host "Connect with your phone using this exact address:" -ForegroundColor Green
            Write-Host "Address: $direct_address" -ForegroundColor Yellow
            Write-Host "Username: RdpRunnerAdmin" -ForegroundColor Green
            Write-Host "Password: GitHubWin10SecureP@ss!" -ForegroundColor Green
            Write-Host "==========================================================" -ForegroundColor Green
        } else {
            Write-Host "Bore failed to respond. Recent logs:" -ForegroundColor Red
            if (Test-Path ".\bore_err.log") {
                Get-Content ".\bore_err.log" -Tail 20
            }
            exit 1
        }

    - name: تنظیم مانیتورینگ و اجرای برنامه پایتون جهت زنده نگه داشتن سرور
      env:
        GH_PAT: ${{ secrets.GH_PAT }}
      run: |
        # اجرای اسکریپت پایتون
        python keep_alive.py
