name: Windows 10 Keep Alive RDP & Web

on:
  workflow_dispatch:

jobs:
  build_and_run:
    runs-on: windows-latest
    timeout-minutes: 360 # حداکثر زمان مجاز ۶ ساعت

    steps:
    - name: دریافت کدهای مخزن
      uses: actions/checkout@v4

    - name: نصب سرور گرافیکی و وب کلاینت (TightVNC & noVNC)
      shell: powershell
      run: |
        Write-Host "Installing VNC Server..."
        # نصب سرور VNC برای شبیه‌سازی گرافیکی دسکتاپ ویندوز
        choco install tightvnc -y --params "/Password:GitHubWin10SecureP@ss! /AssociateFiles:No"
        
        Write-Host "Downloading noVNC client..."
        # دانلود وب کلاینت HTML5 برای اجرای ویندوز در مرورگر وب
        Invoke-WebRequest -Uri "https://github.com/novnc/noVNC/archive/refs/tags/v1.4.0.zip" -OutFile "novnc.zip"
        Expand-Archive novnc.zip -DestinationPath "C:\" -Force
        Rename-Item -Path "C:\noVNC-1.4.0" -NewName "noVNC"
        Copy-Item "C:\noVNC\vnc.html" "C:\noVNC\index.html" # تنظیم صفحه اصلی دسکتاپ وب

    - name: فعال‌سازی سرویس RDP پیش‌فرض ویندوز
      shell: powershell
      run: |
        Write-Host "Configuring Remote Desktop Services..."
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0
        Set-Service -Name "TermService" -StartupType Automatic
        Start-Service -Name "TermService"
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        
        # ساخت کاربر ادمین RDP
        $Username = "RdpRunnerAdmin"
        $Password = ConvertTo-SecureString "GitHubWin10SecureP@ss!" -AsPlainText -Force
        if (!(Get-LocalUser -Name $Username -ErrorAction SilentlyContinue)) {
            New-LocalUser $Username -Password $Password -Description "RDP Admin User"
        }
        Add-LocalGroupMember -Group "Administrators" -Member $Username -ErrorAction SilentlyContinue
        Add-LocalGroupMember -Group "Remote Desktop Users" -Member $Username -ErrorAction SilentlyContinue

    - name: راه‌اندازی وب دسکتاپ (Websockets Bridge)
      shell: powershell
      run: |
        Write-Host "Installing Python Websockify..."
        pip install websockify
        
        Write-Host "Starting Websockify Server on port 8080..."
        # تبدیل دسکتاپ گرافیکی به پورت وب ۸۰۸۰ به صورت پس‌زمینه
        Start-Process python -ArgumentList "-m websockify --web C:\noVNC 8080 localhost:5900" -WindowStyle Hidden

    - name: دانلود و راه‌اندازی کلودفلر تونل (Cloudflare Tunnel)
      shell: powershell
      run: |
        Write-Host "Downloading Cloudflared..."
        Invoke-WebRequest -Uri "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe" -OutFile "cloudflared.exe"
        
        Write-Host "Starting Cloudflare Quick Tunnel on port 8080 (Web Desktop)..."
        # هدایت ترافیک وب‌دسکتاپ به سرورهای پرسرعت کلودفلر
        Start-Process .\cloudflared.exe -ArgumentList "tunnel --url http://localhost:8080" -RedirectStandardError ".\cf_tunnel.log"
        
        Write-Host "Starting Cloudflare RDP Tunnel on port 3389 (Native RDP)..."
        # هدایت ترافیک مستقیم ریموت دسکتاپ به کلودفلر
        Start-Process .\cloudflared.exe -ArgumentList "tunnel --url tcp://localhost:3389" -RedirectStandardError ".\cf_rdp_tunnel.log"
        
        # انتظار برای ساخت دامنه‌ها توسط کلودفلر
        Start-Sleep -Seconds 12
        
        $web_url = $null
        $rdp_url = $null
        
        # استخراج دامنه‌های ساخته شده
        if (Test-Path ".\cf_tunnel.log") {
            $log = Get-Content ".\cf_tunnel.log" -Raw
            if ($log -match "https://[a-zA-Z0-9-]+\.trycloudflare\.com") {
                $web_url = $matches[0]
            }
        }
        if (Test-Path ".\cf_rdp_tunnel.log") {
            $log_rdp = Get-Content ".\cf_rdp_tunnel.log" -Raw
            if ($log_rdp -match "tcp://[a-zA-Z0-9-]+\.trycloudflare\.com:\d+") {
                $rdp_url = $matches[0]
            }
        }
        
        Write-Host "==========================================================" -ForegroundColor Green
        Write-Host "CLOUDFLARE UNFILTERED TUNNELS ARE ONLINE!" -ForegroundColor Green
        Write-Host "----------------------------------------------------------" -ForegroundColor Green
        Write-Host "METHOD 1: CONNECT DIRECTLY IN YOUR PHONE BROWSER (NO APP NEEDED):" -ForegroundColor Yellow
        Write-Host "Open this URL in Chrome/Safari on your Phone:" -ForegroundColor Cyan
        Write-Host "$web_url" -ForegroundColor Green
        Write-Host "Then click 'Connect' and enter password: GitHubWin10SecureP@ss!" -ForegroundColor LightYellow
        Write-Host "----------------------------------------------------------" -ForegroundColor Green
        Write-Host "METHOD 2: NATIVE RDP CONNECTION USING RD CLIENT APP:" -ForegroundColor Yellow
        Write-Host "To use RD Client App, you need Cloudflared on your phone (via Termux/iSH)." -ForegroundColor Yellow
        Write-Host "RDP Target Host: $rdp_url" -ForegroundColor Cyan
        Write-Host "==========================================================" -ForegroundColor Green

    - name: اجرای برنامه پایتون جهت زنده نگه داشتن سرور و ری استارت ۵.۵ ساعته
      env:
        GH_PAT: ${{ secrets.GH_PAT }}
      run: |
        python keep_alive.py
